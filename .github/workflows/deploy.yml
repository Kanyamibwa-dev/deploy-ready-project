name: CI/CD Pipeline

# Run this pipeline on every push to main
on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ---------- STEP 1: TEST ----------
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      # Check out the repository code so later steps can access it
      - name: Checkout code
        uses: actions/checkout@v4

      # Install the Node.js version the app is built for
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      # Install dependencies exactly as locked in package-lock.json
      - name: Install dependencies
        working-directory: ./app
        run: npm ci

      # Run the automated test suite. If this fails, the whole
      # pipeline stops here and nothing gets built or deployed.
      - name: Run tests
        working-directory: ./app
        run: npm test

  # ---------- STEP 2 & 3: BUILD + PUSH ----------
  build-and-push:
    name: Build and push Docker image
    needs: test # only runs if the test job succeeded
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # needed to push to GitHub Container Registry
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Authenticate to GitHub Container Registry using the
      # automatically-provided GITHUB_TOKEN (no manual secret needed for this step)
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build the Docker image and tag it two ways:
      # one immutable tag with the exact commit SHA, and one "latest" tag
      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            .

      # Push both tags to the registry
      - name: Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  # ---------- STEP 4: DEPLOY ----------
  deploy:
    name: Deploy to Render
    needs: build-and-push # only runs if the build/push job succeeded
    runs-on: ubuntu-latest
    steps:
      # Render watches its own deploy hook URL: hitting it tells Render
      # to pull the latest image from GHCR and restart the service.
      # RENDER_DEPLOY_HOOK is stored as an encrypted GitHub repository
      # secret, never in this file.
      - name: Trigger Render deploy
        run: curl -f "${{ secrets.RENDER_DEPLOY_HOOK }}"

      # Give Render a little time to pull the image and restart,
      # then confirm the live service actually responds
      - name: Verify health endpoint
        run: |
          sleep 30
          curl -f ${{ secrets.RENDER_SERVICE_URL }}/health